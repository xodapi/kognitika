name: Bug report
description: Report a reproducible product or production bug.
title: "[P1] "
labels: ["status:planned"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is broken, and what user-visible behavior did you observe?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: List exact steps, URL/route, browser/profile state, and expected vs actual behavior.
      placeholder: |
        1. Open ...
        2. Click ...
        3. Expected ...
        4. Actual ...
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What must be true before this can close?
      placeholder: |
        - [ ] Regression test added
        - [ ] Production-style verification passes
        - [ ] No real user data added to code/tests/logs
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy and data notes
      description: Mention whether Brain ID, tokens, email, localStorage, telemetry, or user content are involved.
      placeholder: Use synthetic data only. Do not paste real user data, raw Brain ID, tokens, or private telemetry.
    validations:
      required: true
