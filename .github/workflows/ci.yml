name: CI

on:
  push:
    branches: [main, master, "codex/**"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: adminpassword
          POSTGRES_DB: cognitika
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d cognitika"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://admin:adminpassword@localhost:5432/cognitika?schema=public
      JWT_SECRET: ci-only-replace-with-strong-secret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.22.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm validate
      - run: pnpm build
      - run: pnpm check:bundle
      - run: pnpm exec playwright install --with-deps chromium
      - name: Run Playwright E2E
        env:
          PORT: 3006
          BASE_URL: http://127.0.0.1:3006
          NODE_ENV: production
          NO_PROXY: 127.0.0.1,localhost,::1
          no_proxy: 127.0.0.1,localhost,::1
        run: |
          set -euo pipefail
          log_file="$(mktemp)"
          pnpm start > "$log_file" 2>&1 &
          server_pid="$!"
          cleanup() {
            status="$?"
            kill "$server_pid" 2>/dev/null || true
            if [ "$status" -ne 0 ]; then
              cat "$log_file" || true
            fi
            rm -f "$log_file"
            exit "$status"
          }
          trap cleanup EXIT

          ready=""
          for attempt in $(seq 1 60); do
            if ready="$(curl -fsS "$BASE_URL/api/health" 2>/dev/null)"; then
              break
            fi
            echo "Waiting for local E2E server ($attempt/60)..."
            sleep 1
          done

          if [ -z "$ready" ]; then
            echo "Local E2E server did not become healthy" >&2
            exit 1
          fi

          echo "$ready"
          pnpm test:e2e:attached
