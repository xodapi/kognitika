<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Когнитика — профессиональная платформа для тренировки внимания, памяти и скорости реакции. Развивайте когнитивные функции с помощью проверенных методик." />
    <meta property="og:title" content="Когнитика — Тренажер внимания и памяти" />
    <meta property="og:description" content="Развивайте внимание и память с помощью профессиональных когнитивных тестов." />
    <!-- <link rel="manifest" href="/manifest.json" /> -->
    <title>Когнитика — Тренажер внимания и памяти</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx" onerror="handleScriptError()"></script>
    <script>
      function handleScriptError() {
        console.error('[FATAL] Failed to load main script bundle. Attempting recovery...');
        if (!window.location.search.includes('retry=1')) {
          const url = new URL(window.location.href);
          url.searchParams.set('retry', '1');
          // Очистка кеша перед ретраем
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(regs => {
              for(let reg of regs) reg.unregister();
              window.location.href = url.toString();
            });
          } else {
            window.location.href = url.toString();
          }
        }
      }
      // Авто-детект белого экрана (если через 5 сек root всё еще пуст)
      setTimeout(() => {
        const root = document.getElementById('root');
        if (root && root.innerHTML === '' && !window.location.search.includes('retry=1')) {
          handleScriptError();
        }
      }, 5000);
    </script>
    <!-- PWA Disabled temporarily to resolve White Screen issues -->
    <script>
      // Kill Switch for any existing Service Workers
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(registrations => {
          for(let registration of registrations) {
            registration.unregister().then(success => {
              if(success) console.log('[PWA] ServiceWorker killed successfully');
            });
          }
        });
      }

          });
        });
      }
      */

  </body>
</html>
