<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Когнитика — профессиональная платформа для тренировки внимания, памяти и скорости реакции. Развивайте когнитивные функции с помощью проверенных методик." />
    <meta name="keywords" content="когнитивные тренажеры, развитие памяти, тренировка внимания, таблицы шульте, н-назад, тест струпа" />
    <meta property="og:title" content="Когнитика — Тренажер внимания и памяти" />
    <meta property="og:description" content="Развивайте внимание и память с помощью профессиональных когнитивных тестов." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kognitika.ru/" />
    <!-- <link rel="manifest" href="/manifest.json" /> -->
    <title>Когнитика — Тренажер внимания и памяти</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx" onerror="handleScriptError()"></script>
    <script>
      function handleScriptError() {
        console.error('[FATAL] Failed to load main script bundle. Attempting recovery...');
        if (!window.location.search.includes('retry=1')) {
          const url = new URL(window.location.href);
          url.searchParams.set('retry', '1');
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(regs => {
              for(let reg of regs) reg.unregister();
              window.location.href = url.toString();
            });
          } else {
            window.location.href = url.toString();
          }
        }
      }
      setTimeout(() => {
        const root = document.getElementById('root');
        if (root && root.innerHTML === '' && !window.location.search.includes('retry=1')) {
          handleScriptError();
        }
      }, 5000);
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
            console.log('[PWA] ServiceWorker unregistered');
          }
        });
      }
    </script>
  </body>
</html>
