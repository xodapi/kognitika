version: '3.8'

services:
  db:
    image: postgres:15
    container_name: cognitika_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: cognitika
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: cognitika_app
    ports:
      - "3006:3006"
    environment:
      - DATABASE_URL=postgresql://admin:adminpassword@db:5432/cognitika?schema=public
      - JWT_SECRET=replace-with-strong-random-secret
      - NODE_ENV=production
      - PORT=3006
    depends_on:
      - db

volumes:
  pgdata:
