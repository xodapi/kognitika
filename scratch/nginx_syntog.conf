server {
    listen 80;
    server_name syntog.ru www.syntog.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name syntog.ru www.syntog.ru;

    root /var/www/site;
    index index.html;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload";

    # API reverse-proxy
    location /api/ {
        proxy_pass http://127.0.0.1:3003/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /stroy/ {
        alias /var/www/site/stroy/;
        try_files $uri $uri/ /stroy/index.html =404;
    }

    location /community/ {
        alias /var/www/site/community/;
        try_files $uri $uri/ /community/index.html =404;
    }

    location /garden/ {
        alias /var/www/site/garden/;
        try_files $uri $uri/ /garden/index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    ssl_certificate /etc/letsencrypt/live/syntog.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/syntog.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
